<!DOCTYPE html>
<html lang="it">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Vista Mare - Prenotazioni</title>

  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#21808D">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9; }
    iframe { border: none; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbxr0w5j5T5cJjOcuY7XYuDEXkR-73We3CES-MTETR5D9tG5SFC9Rxe1hdAPZN9uGwabGA/exec"></iframe>
  <script>
    // Questo codice attiva la possibilità di installare l'app
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('PWA configurata con successo.'))
        .catch((err) => console.error('Errore PWA:', err));
    }
  </script>
</body>
</html>
